<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aphelion app icon">
  <defs>
    <linearGradient id="ai-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"></stop>
      <stop offset="50%" stop-color="#C084FC"></stop>
      <stop offset="100%" stop-color="#FF79C6"></stop>
    </linearGradient>
    <radialGradient id="ai-void" cx="50%" cy="34%" r="90%">
      <stop offset="0%" stop-color="#16093A"></stop>
      <stop offset="55%" stop-color="#0C0426"></stop>
      <stop offset="100%" stop-color="#07021A"></stop>
    </radialGradient>
    <linearGradient id="ai-gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFEFF" stop-opacity="0.16"></stop>
      <stop offset="34%" stop-color="#ECFEFF" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="ai-ring" x1="0.12" y1="0.1" x2="0.9" y2="0.92">
      <stop offset="0%" stop-color="#22D3EE"></stop><stop offset="34%" stop-color="#5EEAD4"></stop>
      <stop offset="62%" stop-color="#C084FC"></stop><stop offset="100%" stop-color="#FF79C6"></stop>
    </linearGradient>
    <radialGradient id="ai-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="0"></stop>
      <stop offset="82%" stop-color="#5EEAD4" stop-opacity="0.5"></stop>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="ai-planet" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#FFE6F5"></stop><stop offset="45%" stop-color="#FF79C6"></stop><stop offset="100%" stop-color="#C084FC"></stop>
    </radialGradient>
    <filter id="ai-soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"></feGaussianBlur></filter>
    <filter id="ai-rim" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.8"></feGaussianBlur></filter>
    <filter id="ai-edgeglow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"></feGaussianBlur></filter>
    <filter id="ai-halo" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="4"></feGaussianBlur></filter>
  </defs>

  <rect x="20" y="20" width="216" height="216" rx="52" fill="url(#ai-void)"></rect>
  <rect x="20" y="20" width="216" height="216" rx="52" fill="none" stroke="url(#ai-border)" stroke-width="6" filter="url(#ai-edgeglow)" opacity="0.7"></rect>
  <rect x="20" y="20" width="216" height="216" rx="52" fill="none" stroke="url(#ai-border)" stroke-width="3"></rect>
  <rect x="20" y="20" width="216" height="216" rx="52" fill="url(#ai-gloss)"></rect>

  <g transform="rotate(-20 128 128)">
    <ellipse cx="128" cy="128" rx="85" ry="67" fill="none" stroke="url(#ai-ring)" stroke-width="1.4" opacity="0.45"></ellipse>
    <circle cx="213" cy="128" r="12" fill="#FF79C6" opacity="0.5" filter="url(#ai-halo)"></circle>
    <circle cx="213" cy="128" r="5.2" fill="url(#ai-planet)"></circle>
    <circle cx="211" cy="126" r="1.5" fill="#FFFFFF" opacity="0.9"></circle>
  </g>

  <circle cx="128" cy="128" r="72" fill="url(#ai-bloom)" filter="url(#ai-soft)"></circle>
  <circle cx="128" cy="128" r="58" fill="none" stroke="url(#ai-ring)" stroke-width="16" filter="url(#ai-soft)" opacity="0.85"></circle>
  <circle cx="128" cy="128" r="56" fill="#000000"></circle>
  <circle cx="128" cy="128" r="57" fill="none" stroke="url(#ai-ring)" stroke-width="4.5" filter="url(#ai-rim)"></circle>
  <circle cx="128" cy="128" r="57" fill="none" stroke="#ECFEFF" stroke-width="1.1" opacity="0.9"></circle>
</svg>
