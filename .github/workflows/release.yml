name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and attach (e.g. v0.1.1)
        required: true
        default: v0.1.1

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest   # Windows installer (.exe / NSIS)
          - os: ubuntu-22.04      # Linux (.AppImage / .deb)
          - os: macos-14          # macOS Apple Silicon (.dmg / .app, Metal)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Fetch llama.cpp engine (per-OS)
        run: node scripts/fetch-engine.mjs

      - name: Build app + publish to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — produces signed update artifacts + latest.json (key has an empty password).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Google OAuth "Desktop app" client — injected at build time (kept out of the repo;
          # ships inside the binary, which Google documents as expected for installed apps).
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_SECRET }}
        with:
          projectPath: frontend
          # Release overlay: turns on signed updater artifacts (latest.json + .sig) and the
          # full per-OS bundle set. Local dev builds keep the keyless nsis-only base config.
          args: --config src-tauri/tauri.release.conf.json
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Syzygy ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            Syzygy is local-first: run local models, connect optional AI providers, or work without AI. Drive collaboration is available when you enable it.
            Download the build for your OS under **Assets**:
            • **Windows** — `-setup.exe`  • **macOS** — `.dmg`  • **Linux** — `.AppImage` or `.deb`

            macOS builds are not yet notarized; right-click → Open the first time. Windows: More info → Run anyway.
          # Draft until every OS has uploaded — otherwise the updater feed goes live with a
          # partial platforms object and Windows users get "no platform found" errors while
          # the (slowest) Windows job is still building. The publish job below flips it live.
          releaseDraft: true
          prerelease: false

  # Publish the release only after ALL platform builds have uploaded their artifacts.
  # Until then the previous complete release remains "latest" and updaters see a whole feed.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish the drafted release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.event.inputs.tag || github.ref_name }}" \
            --repo "${{ github.repository }}" --draft=false
