name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend (typecheck · build · unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --prefix frontend install
      - name: Typecheck + production build
        run: npm --prefix frontend run build
      - name: Unit tests (vitest)
        run: npm --prefix frontend test

  rust:
    name: Rust (cargo test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The Tauri lib embeds bundled resources at compile time (generate_context!),
      # so the engine binaries must be present even for `cargo test`.
      - name: Fetch bundled engines
        run: node scripts/fetch-engine.mjs
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      - name: Unit tests (cargo test)
        run: cargo test --manifest-path frontend/src-tauri/Cargo.toml
